<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizações - BitHealth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/1241841.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary shadow">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">BitHealth | Gestão de Localizações</span>
            <a href="dashboard.html" class="btn btn-outline-light btn-sm">Voltar</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between mb-3">
            <h2>Localizações Hospitalares</h2>
            <button class="btn btn-success">Nova Localização</button>
        </div>

        <div class="card shadow-sm">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Edifício</th>
                        <th>Piso</th>
                        <th>Serviço/Departamento</th>
                        <th>Sala/Gabinete</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Edifício Central</td>
                        <td>Piso 2</td>
                        <td>Urgência</td>
                        <td>Sala de Choque 1</td>
                    </tr>
                    <tr>
                        <td>Bloco B</td>
                        <td>Piso 0</td>
                        <td>Radiologia</td>
                        <td>Sala Raio-X 2</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/1241841.js"></script>
