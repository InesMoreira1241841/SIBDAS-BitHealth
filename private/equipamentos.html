<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário - BitHealth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/1241841.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary shadow">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">BitHealth | Gestão de Inventário</span>
            <div>
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a href="../public/index.html" class="btn btn-outline-light btn-sm">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Inventário de Equipamentos</h2>
            <button class="btn btn-success">Adicionar Novo</button>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover border">
                <thead class="table-dark">
                    <tr>
                        <th>Código</th>
                        <th>Equipamento</th>
                        <th>Marca/Modelo</th>
                        <th>Localização</th>
                        <th>Estado</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>INV-001</td>
                        <td>Monitor Multiparamétrico</td>
                        <td>Philips IntelliVue</td>
                        <td>UCI - Piso 2</td>
                        <td><span class="badge bg-success">Ativo</span></td>
                        <td>
                            <button class="btn btn-sm btn-info">Ver</button>
                            <button class="btn btn-sm btn-warning">Editar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/1241841.js"></script>
</body>
</html>
