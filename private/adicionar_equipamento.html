<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Equipamento - BitHealth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/1241841.css">
</head>

<body>
    <nav class="navbar navbar-dark bg-primary shadow">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">BitHealth | Novo Registro</span>
            <a href="equipamentos.html" class="btn btn-outline-light btn-sm">Voltar</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Registar Equipamento Médico</h4>
            </div>

            <div class="card-body">
                <form class="row g-3" action="inserir_equipamento.php" method="POST">
                    <div class="col-md-4">
                        <label for="codigo" class="form-label">Código Interno (Inventário)</label>
                        <input type="text" name="codigo" class="form-control" id="codigo" placeholder="ex: INV-2025-001" required>
                    </div>
                    
                    <div class="col-md-8">
                        <label for="nome" class="form-label">Designação do Equipamento</label>
                        <input type="text" name="designacao" class="form-control" id="nome" required>
                    </div>

                    <div class="col-md-6">
                        <label for="marca" class="form-label">Marca/Modelo</label>
                        <input type="text" name="marca" class="form-control" id="marca" required>
                    </div>

                    <div class="col-md-6">
                        <label for="data" class="form-label">Data de Aquisição</label>
                        <input type="date" name="data" class="form-control" id="data">
                    </div>

                    <div class="col-md-6">
                        <label for="criticidade" class="form-label">Criticidade Clínica</label>
                        <select name="criticidade" id="criticidade" class="form-select">
                            <option value="Baixa">Baixa</option>
                            <option value="Média">Média</option>
                            <option value="Alta">Alta</option>
                            <option value="Suporte de Vida">Suporte de Vida</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="estado" class="form-label">Estado Atual</label>
                        <select name="estado" id="estado" class="form-select">
                            <option value="Ativo">Ativo</option>
                            <option value="Em manutenção">Em manutenção</option>
                            <option value="Inativo">Inativo</option>
                        </select>
                    </div>

                    <div class="col-12 mt-4 text-end">
                        <button type="submit" class="btn btn-primary px-5">Guardar Equipamento</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/1241841.js"></script>
</body>
</html>
