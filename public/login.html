<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BitHealth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/1241841.css">
</head>
<body class="d-flex align-items-center py-4 bg-light" style="height: 100vh;">

<main class="form-signin w-100 m-auto" style="max-width: 330px;">
  <form>
    <h1 class="h3 mb-3 fw-normal text-center">Acesso ao Sistema</h1>

    <div class="form-floating mb-2">
      <input type="email" class="form-control" id="floatingInput" placeholder="nome@isep.ipp.pt">
      <label for="floatingInput">Email institucional</label>
    </div>
    <div class="form-floating mb-3">
      <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
      <label for="floatingPassword">Palavra-passe</label>
    </div>

    <button class="w-100 btn btn-lg btn-primary" type="submit">Entrar</button>
    <p class="mt-5 mb-3 text-muted text-center">&copy; BitHealth 2025</p>
  </form>
</main>

</body>
</html>
